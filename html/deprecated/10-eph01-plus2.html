function getCookie(c_name)
{
	if (document.cookie.length>0)
  	{
  		c_start=document.cookie.indexOf(c_name + "=");
  		if (c_start!=-1)
    		{
    			c_start=c_start + c_name.length+1;
    			c_end=document.cookie.indexOf(";",c_start);
    			if (c_end==-1) c_end=document.cookie.length;
    			return unescape(document.cookie.substring(c_start,c_end));
    		}
  	}
	return "";
}

function setCookie(c_name,value,expiredays)
{

	exdate.setDate(exdate.getDate()+expiredays);

}

function toggleAccents()
{
	if( g_accent != 1 )
		g_accent = 1;
	else
		g_accent = 0;

	setCookie('accents', g_accent, 365 );

	//alert( g_accent );
}

function displayText(chapter)
{	
	if( chapter != null )
		ch = chapter;

	g_accent = getCookie( 'accents' );

	if( g_accent == 1 )
	{
		grk_text = accent_text;	
	}
	else
	{
		grk_text = nonaccent_text;
	}

	

	document.getElementById('greektext').innerHTML = "";
	for( i=0; i < grk_text[ch].length; i++ )
	{
		document.getElementById('greektext').innerHTML += "<b> "+grk_text[ch][i][1]+" </b>";
		document.getElementById('greektext').innerHTML += "<i onClick=\"playSoundMain('" + grk_text[ch][i][0] + "');\"> "+grk_text[ch][i][2]+" </i>";
	}

}

function buildSelect()
{
	v = document.getElementById('chaps');

	v.innerHTML = "<option value=\"0\" selected=\"yes\">Chapter 1</option>";

	for( c=1; c < accent_text.length; c++ )
	{
		v.innerHTML += "<option value=\""+(c)+"\">Chapter "+(c+1)+"</option>";
	}
}

function display()
{
	v = document.getElementById('chaps');

	displayText(v.value);
}

function checkCookies()
{
	g_accent = getCookie( 'accents' );
}
